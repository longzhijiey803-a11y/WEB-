<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBテスト（玉手箱・C-GAB）模擬問題</title>
<style>
  :root {
    --bg: #f5f5f7;
    --panel: #ffffff;
    --text: #1d1d1f;
    --muted: #6e6e73;
    --border: #d2d2d7;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --correct: #34c759;
    --wrong: #ff3b30;
    --warning: #ff9500;
    --shadow: 0 2px 8px rgba(0,0,0,0.06);
    --mono: "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "ヒラギノ角ゴ Pro", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
  }
  #app { max-width: 880px; margin: 0 auto; padding: 24px 16px 64px; }
  h1 { font-size: 22px; margin: 0 0 8px; }
  h2 { font-size: 18px; margin: 0 0 12px; }
  .muted { color: var(--muted); font-size: 13px; }
  .hint { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .panel { background: var(--panel); border-radius: 12px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 16px; }
  label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--muted); }
  input[type="password"], input[type="text"], input[type="search"], input[type="email"], input[type="tel"], select, textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; background: #fff; font-family: inherit;
  }
  select { min-height: 42px; }
  input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; font-family: var(--mono); font-size: 12px; }
  button {
    background: var(--accent); color: white; border: none;
    padding: 10px 20px; border-radius: 8px; font-size: 14px;
    cursor: pointer; font-family: inherit; transition: background 0.15s;
  }
  button:hover:not(:disabled) { background: var(--accent-hover); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: transparent; color: var(--accent); border: 1px solid var(--border); }
  button.secondary:hover:not(:disabled) { background: #f0f0f5; }
  button.ghost { background: transparent; color: var(--muted); border: none; padding: 6px 12px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .field { margin-bottom: 16px; }
  .error { background: #fff2f2; color: var(--wrong); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
  .notice { background: #e8f2ff; color: var(--accent); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
  .progress-bar { height: 6px; background: #e5e5ea; border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
  @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

  /* Language toggle */
  .lang-toggle { display: flex; gap: 12px; }
  .start-btn-big {
    background: var(--wrong);
    color: white;
    font-size: 18px;
    font-weight: 700;
    padding: 16px 40px;
    border-radius: 10px;
    box-shadow: 0 4px 12px rgba(255,59,48,0.3);
  }
  .start-btn-big:hover:not(:disabled) {
    background: #e0322a;
  }
  .lang-btn {
    flex: 1;
    background: transparent;
    color: var(--text);
    border: 2px solid var(--border);
    padding: 18px 8px;
    font-size: 15px;
    font-weight: 600;
    border-radius: 12px;
    white-space: nowrap;
  }
  @media (min-width: 600px) {
    .lang-btn { padding: 22px 12px; font-size: 17px; }
  }
  .lang-btn:hover { background: #f0f0f5; }
  .lang-btn.active {
    background: var(--accent); color: white; border-color: var(--accent);
    box-shadow: 0 4px 12px rgba(0,113,227,0.25);
  }

  .faq-link {
    color: var(--accent);
    font-size: 13px;
    text-decoration: underline;
    margin-bottom: 14px;
    cursor: default;
    user-select: none;
  }

  /* Test screen */
  .q-num { font-size: 20px; font-weight: 700; margin-right: 12px; }
  .q-lead { font-size: 14px; color: var(--text); }
  .passage-block {
    margin: 16px 0 0;
    padding: 16px 20px;
    border-left: 4px solid var(--accent);
    background: #f5f8fc;
    border-radius: 4px;
    white-space: pre-wrap;
    font-size: 15px;
    line-height: 1.9;
  }
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .q-statement { font-size: 16px; font-weight: 600; padding: 12px 0; }

  /* 計数モード */
  .num-meta { margin: 16px 0 8px; display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
  .table-theme { margin: 0; font-size: 15px; font-weight: 700; }
  .table-note { margin: 0; color: var(--muted); font-size: 12px; }
  .data-table-wrap { overflow-x: auto; margin: 8px 0 16px; }
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    background: #fff;
  }
  .data-table th, .data-table td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: right;
    white-space: nowrap;
  }
  .data-table th {
    background: #f5f5f7;
    font-weight: 600;
  }
  .data-table td:first-child, .data-table th:first-child {
    text-align: left;
  }
  .raw-table {
    background: #f5f5f7;
    padding: 12px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 13px;
    overflow-x: auto;
  }
  .chart-wrap { margin: 12px 0 16px; overflow-x: auto; }
  .blank-cell { background: #fff4e6; color: #ff9500; font-weight: 700; }

  .choices-radio { display: flex; flex-direction: column; gap: 4px; margin: 8px 0 20px; }
  .choice-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent; font-size: 14px; line-height: 1.6;
    user-select: none; transition: background 0.12s, border-color 0.12s;
  }
  .choice-row:hover:not(.locked) { background: #f5f5f7; }
  .choice-row.selected { background: #e8f2ff; border-color: var(--accent); }
  .choice-row.locked { cursor: default; }
  .choice-row.reveal-correct { border-color: var(--correct); background: #e8f9ee; }
  .choice-row.reveal-wrong { border-color: var(--wrong); background: #ffeeee; }
  .radio-icon { flex-shrink: 0; font-size: 18px; line-height: 1.4; color: var(--muted); }
  .choice-row.selected .radio-icon { color: var(--accent); }

  .feedback-banner {
    margin: 12px 0 8px;
    padding: 10px 14px;
    border-radius: 8px;
    text-align: center;
    font-weight: 700;
    font-size: 16px;
    animation: fbIn 0.25s ease-out;
  }
  .feedback-banner.ok { background: #e8f9ee; color: var(--correct); }
  .feedback-banner.ng { background: #ffeeee; color: var(--wrong); }
  @keyframes fbIn { from {opacity:0; transform: scale(0.95)} to {opacity:1; transform: none} }

  .status-row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; font-family: var(--mono); font-size: 13px; padding: 4px 0;
  }
  .status-row .label { font-family: inherit; font-weight: 600; color: var(--text); }
  .status-row .bar { letter-spacing: -1px; }
  .status-row.warn .bar { color: var(--warning); }
  .status-row.danger .bar { color: var(--wrong); }

  .next-btn {
    font-family: var(--mono);
    background: var(--text); color: #fff;
    padding: 8px 16px; border-radius: 6px; letter-spacing: 0.5px;
  }
  .next-btn:hover:not(:disabled) { background: #333; }

  .warn-bottom {
    display: flex; justify-content: space-between; gap: 12px;
    margin-top: 12px; font-size: 12px; color: var(--wrong);
  }

  /* Results */
  .score-big { font-size: 48px; font-weight: 700; text-align: center; margin: 12px 0; }
  .score-sub { text-align: center; color: var(--muted); }
  .breakdown-item { border-top: 1px solid var(--border); padding: 12px 0; }
  .breakdown-item:first-child { border-top: none; }
  .breakdown-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; cursor: pointer; }
  .breakdown-title { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .result-view-btn {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.3;
  }
  .result-view-btn:hover:not(:disabled) { background: #f0f0f5; }
  .breakdown-detail { margin-top: 12px; padding: 12px; background: #f5f5f7; border-radius: 8px; font-size: 13px; display: none; }
  .breakdown-detail.open { display: block; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge.correct { background: #e8f9ee; color: var(--correct); }
  .badge.wrong { background: #ffeeee; color: var(--wrong); }

  .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid var(--border); }
  .history-item:first-child { border-top: none; }

  .diagnosis-start { display: grid; gap: 16px; }
  .setup-hero {
    background: linear-gradient(135deg, #ffffff 0%, #f7fbff 52%, #f7f2ff 100%);
    border: 1px solid #e7e9f0;
    border-radius: 8px;
    padding: 28px;
    box-shadow: var(--shadow);
  }
  .setup-hero-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
  }
  .setup-eyebrow {
    display: block;
    margin-bottom: 8px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0;
  }
  .diagnosis-title {
    margin: 0;
    font-size: 30px;
    line-height: 1.25;
  }
  .setup-copy { margin: 10px 0 0; color: var(--muted); font-size: 14px; }
  .setup-type-chip {
    min-width: 128px;
    padding: 12px 14px;
    border: 1px solid #dfe3ec;
    border-radius: 8px;
    background: #fff;
    text-align: center;
  }
  .setup-type-chip strong { display: block; color: var(--text); font-size: 26px; line-height: 1.1; }
  .setup-type-chip span { display: block; margin-top: 4px; color: var(--muted); font-size: 12px; }
  .setup-metrics,
  .result-metrics {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-top: 18px;
  }
  .metric-tile {
    min-height: 78px;
    padding: 12px;
    border: 1px solid #e1e4eb;
    border-radius: 8px;
    background: rgba(255,255,255,0.78);
  }
  .metric-label { display: block; color: var(--muted); font-size: 12px; }
  .metric-value { display: block; margin-top: 4px; color: var(--text); font-size: 20px; font-weight: 700; }
  .mode-card-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }
  .diagnosis-start .lang-btn.mode-card {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    min-height: 154px;
    padding: 16px;
    border: 1px solid #dfe3ec;
    border-radius: 8px;
    background: #fff;
    color: var(--text);
    text-align: left;
    white-space: normal;
    box-shadow: none;
  }
  .diagnosis-start .lang-btn.mode-card:hover { background: #f8fbff; border-color: #b8cceb; }
  .diagnosis-start .lang-btn.mode-card.active {
    background: #f0f7ff;
    border-color: var(--accent);
    box-shadow: 0 8px 20px rgba(0,113,227,0.12);
  }
  .mode-code { color: var(--accent); font-size: 12px; font-weight: 800; letter-spacing: 0; }
  .mode-title { font-size: 15px; font-weight: 700; line-height: 1.35; }
  .mode-desc { color: var(--muted); font-size: 12px; line-height: 1.55; }
  .mode-meta { margin-top: auto; color: var(--text); font-size: 12px; font-weight: 700; }
  .setup-action-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .diagnosis-start .start-btn-big {
    background: var(--text);
    box-shadow: none;
    border-radius: 8px;
    min-width: 190px;
  }
  .diagnosis-start .start-btn-big:hover:not(:disabled) { background: #34343a; }
  .setup-flow-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    margin-top: 12px;
  }
  .setup-flow-item {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    font-size: 13px;
  }
  .setup-flow-item strong { display: block; margin-bottom: 3px; }
  .setup-section {
    padding: 4px 0;
  }
  .setup-section h2 { margin-bottom: 12px; }

  .result-shell { display: grid; gap: 16px; }
  .result-hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 176px;
    align-items: center;
    gap: 24px;
    padding: 28px;
    border-radius: 8px;
    border: 1px solid #e7e9f0;
    background: linear-gradient(135deg, #ffffff 0%, #f8fbff 55%, #fff8f1 100%);
    box-shadow: var(--shadow);
  }
  .result-title { margin: 0; font-size: 30px; line-height: 1.25; }
  .result-profile-line { margin-top: 12px; color: var(--muted); font-size: 13px; }
  .result-score-ring {
    width: 176px;
    aspect-ratio: 1;
    border-radius: 50%;
    background: conic-gradient(var(--accent) calc(var(--score) * 1%), #e5e7ed 0);
    display: grid;
    place-items: center;
  }
  .result-score-ring-inner {
    width: 132px;
    aspect-ratio: 1;
    border-radius: 50%;
    background: #fff;
    display: grid;
    place-items: center;
    text-align: center;
    box-shadow: inset 0 0 0 1px #eef0f4;
  }
  .result-score-ring-inner strong { display: block; font-size: 34px; line-height: 1; }
  .result-score-ring-inner span { display: block; margin-top: 6px; color: var(--muted); font-size: 12px; }
  .section-score-panel,
  .explain-section {
    padding: 22px;
    border: 1px solid #e7e9f0;
    border-radius: 8px;
    background: #fff;
    box-shadow: var(--shadow);
  }
  .section-score-row {
    display: grid;
    grid-template-columns: minmax(120px, 1fr) minmax(160px, 2fr) auto;
    gap: 12px;
    align-items: center;
    padding: 10px 0;
    border-top: 1px solid var(--border);
  }
  .section-score-row:first-of-type { border-top: none; }
  .section-score-bar { height: 8px; border-radius: 999px; background: #eceef3; overflow: hidden; }
  .section-score-bar span { display: block; height: 100%; background: var(--accent); }
  .explain-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 12px;
  }
  .explain-kicker { color: var(--accent); font-size: 12px; font-weight: 800; }
  .explain-card {
    border-top: 1px solid var(--border);
    padding: 14px 0;
  }
  .explain-card:first-of-type { border-top: none; }
  .explain-head {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 12px;
    align-items: center;
    cursor: pointer;
  }
  .question-type {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .question-number {
    flex: 0 0 auto;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: #fff;
    background: var(--text);
    font-weight: 800;
    font-size: 13px;
  }
  .question-summary { min-width: 0; overflow-wrap: anywhere; }
  .question-summary strong { display: block; line-height: 1.35; }
  .question-summary span { display: block; margin-top: 2px; color: var(--muted); font-size: 12px; }
  .answer-state {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 74px;
    padding: 7px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
  }
  .answer-state.correct { background: #e8f9ee; color: var(--correct); }
  .answer-state.wrong { background: #ffeeee; color: var(--wrong); }
  .answer-detail-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin: 12px 0;
  }
  .answer-box {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
  }
  .answer-box span { display: block; color: var(--muted); font-size: 12px; }
  .answer-box strong { display: block; margin-top: 4px; font-size: 13px; overflow-wrap: anywhere; }
  .result-actions { justify-content: flex-end; }

  .profile-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px 16px; }
  .profile-grid .field { margin-bottom: 0; }
  .profile-grid .field.full { grid-column: 1 / -1; }
  .privacy-excerpt {
    max-height: 180px;
    overflow-y: auto;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #f5f5f7;
    font-size: 13px;
    line-height: 1.8;
  }
  .privacy-excerpt.terms-excerpt { max-height: 300px; }
  .legal-pre {
    margin: 0;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.85;
  }
  .privacy-excerpt p { margin: 0 0 8px; }
  .privacy-excerpt p:last-child { margin-bottom: 0; }
  .consent-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 12px 0;
  }
  .consent-row label { margin: 0; color: var(--text); line-height: 1.6; }

  details { margin-top: 12px; }
  summary { cursor: pointer; color: var(--accent); font-size: 13px; }
  code.blob { display: block; background: #f5f5f7; padding: 10px; border-radius: 6px; font-family: var(--mono); font-size: 11px; word-break: break-all; margin: 8px 0; }

  @media (max-width: 640px) {
    .profile-grid { grid-template-columns: 1fr; }
    .setup-hero,
    .result-hero,
    .section-score-panel,
    .explain-section { padding: 18px; }
    .setup-hero-top,
    .setup-action-row,
    .explain-header { display: block; }
    .setup-type-chip { margin-top: 18px; text-align: left; }
    .diagnosis-title { font-size: 24px; }
    .setup-metrics,
    .result-metrics,
    .mode-card-grid,
    .answer-detail-grid { grid-template-columns: 1fr; }
    .diagnosis-start .lang-btn.mode-card { min-height: 126px; }
    .diagnosis-start .start-btn-big { width: 100%; margin-top: 12px; }
    .result-hero { grid-template-columns: 1fr; }
    .result-score-ring { width: min(176px, 62vw); margin: 0 auto; }
    .section-score-row { grid-template-columns: 1fr; }
    .explain-head { grid-template-columns: 1fr; }
    .answer-state { width: max-content; }
    .result-actions { justify-content: stretch; }
    .result-actions button { width: 100%; }
  }
</style>
</head>
<body>

<div id="app"></div>
<video id="correctSound" preload="auto" playsinline style="display:none">
  <source src="correct.mov" type="video/quicktime">
</video>

<script src="/auth-common.js"></script>
<script src="generators.js"></script>
<script>
"use strict";

/* ============================================================
   設定 - 完全オフライン動作（APIキー不要 / 課金ゼロ）
   問題は generators.js 内でアルゴリズム生成 / プール抽選
============================================================ */

/* ============================================================
   モード設定
============================================================ */

const JA_CHOICES = [
  "文脈の論理から明らかに正しい。または正しい内容を含んでいる。",
  "文脈の論理から明らかに間違っている。または間違った内容を含んでいる。",
  "問題文の内容だけからでは、設問文は論理的に導けない。"
];

const MODES = {
  ja: {
    id: "ja",
    label: "言語",
    formatTitle: "玉手箱・GAB形式 / 論理的読解",
    durationMin: 15,
    numPassages: 8,
    qsPerPassage: 4,
    leadText: "次の文章を読み、設問文1つ1つについて以下のA、B、Cのいずれにあたるか答えなさい。",
    choiceLabels: ["A", "B", "C"],
    showFaqLink: false,
    themes: [
      "政治・民主主義", "経済・市場", "科学技術・AI", "環境問題・気候",
      "教育・学び", "医療・公衆衛生", "労働・働き方", "国際関係・グローバル化"
    ],
    systemPrompt: `あなたは就職活動の適性検査（玉手箱・GAB形式）のプロの問題作成者です。
以下のルールに従って、論理的読解問題を1セット作成してください。

【問題の構成】
1. 長文（400〜600字程度。論理展開が明確な評論文。）
2. 設問4つ（長文の内容に関する短い記述）

【選択肢の定義】（厳守）

// セッション毎のプール（ja/en はセッション開始時にシャッフルして確保）
let jaSessionCache = null;
let enSessionCache = null;

function prepareSessionPool(modeId, count) {
  if (modeId === "ja") jaSessionCache = window.Generators.buildJaSession(count);
  else if (modeId === "en") enSessionCache = window.Generators.buildEnSession(count);
}

// 問題を取得し、生成中風の進捗通知を返す（約 2.5〜6 秒）
async function callGenerator(modeId, idx, onProgress) {
  let content;
  if (modeId === "num") content = window.Generators.num(idx);
  else if (modeId === "ja") content = jaSessionCache[idx];
  else if (modeId === "en") content = enSessionCache[idx];
  else throw new Error("unknown mode: " + modeId);

  // 擬似ストリーミング: 所要時間をランダム化し、文字数が徐々に増えていく演出
  const targetLen = JSON.stringify(content).length;
  const duration = 2500 + Math.random() * 3500;
  const steps = 28;
  const stepMs = duration / steps;
  // 単調増加に変化を与えるため、途中で加速/減速する重み付けを作る
  const weights = new Array(steps).fill(0).map(() => 0.5 + Math.random());
  const wSum = weights.reduce((a, b) => a + b, 0);
  let acc = 0;
  for (let i = 0; i < steps; i++) {
    await new Promise(r => setTimeout(r, stepMs));
    acc += weights[i] / wSum;
    if (onProgress) onProgress(Math.min(targetLen, Math.round(targetLen * acc)));
  }
  if (onProgress) onProgress(targetLen);
  return content;
}

function ensureGenerationStarted() {
  if (state.generationStarted) return;
  const mode = getMode();
  const n = mode.numPassages;
  state.generationStarted = true;
  state.generationId += 1;
  const myGenId = state.generationId;
  state.passages = new Array(n).fill(null);
  state.passageErrors = {};
  state.passageProgress = new Array(n).fill(0);
  // ja/en はプール抽選。セッション開始時にシャッフルして重複なしで取り出す
  prepareSessionPool(mode.id, n);
  // 全問を並列で「生成中」。数秒の演出後に順次完了
  state.passagePromises = [];
  for (let i = 0; i < n; i++) {
    const idx = i;
    const p = callGenerator(mode.id, idx, chars => {
      if (state.generationId !== myGenId) return;
      state.passageProgress[idx] = chars;
    }).then(
      result => {
        if (state.generationId !== myGenId) return;
        state.passages[idx] = result;
        onPassageUpdate(idx);
        return result;
      },
      err => {
        if (state.generationId !== myGenId) return;
        state.passageErrors[idx] = err.message || String(err);
        onPassageUpdate(idx);
        throw err;
      }
    );
    state.passagePromises.push(p);
  }
}

function onPassageUpdate(i) {
  if (state.testStarted) {
    const curP = Math.floor(state.currentIdx / getMode().qsPerPassage);
    if (curP === i) renderTest();
    return;
  }
  updatePrefetchStatus();
}

function updatePrefetchStatus() {
  const el = document.getElementById("prefetchStatus");
  if (!el || !state.passages || !state.passages.length) return;
  const total = getNumPassages();
  const done = state.passages.filter(p => p).length;
  const errs = Object.keys(state.passageErrors).length;
  if (errs > 0) {
    el.className = "error";
    el.textContent = `${errs} 問の生成に失敗しました`;
  } else if (done === total) {
    el.className = "notice";
    el.textContent = `✓ 問題の準備が完了しました（${done}/${total}）`;
  } else {
    el.className = "muted";
    el.style.fontSize = "13px";
    el.textContent = `バックグラウンドで準備中... ${done}/${total}`;
  }
}

// マークダウン表 → HTMLテーブル（"?" セルは穴埋めとしてハイライト）
function renderMarkdownTable(md) {
  if (!md) return "";
  const lines = md.split("\n").map(l => l.trim()).filter(l => l);
  const rows = [];
  for (const line of lines) {
    if (!line.startsWith("|")) continue;
    if (/^\|[\s\-:|]+\|?$/.test(line)) continue;
    const stripped = line.replace(/^\|/, "").replace(/\|$/, "");
    rows.push(stripped.split("|").map(c => c.trim()));
  }
  if (rows.length === 0) return `<pre class="raw-table">${escapeHtml(md)}</pre>`;
  const [header, ...body] = rows;
  return `
    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr>${header.map(h => `<th>${escapeHtml(h)}</th>`).join("")}</tr></thead>
        <tbody>${body.map(r => `<tr>${r.map(c => {
          const blank = c === "?" || c === "？";
          return `<td class="${blank ? "blank-cell" : ""}">${escapeHtml(c)}</td>`;
        }).join("")}</tr>`).join("")}</tbody>
      </table>
    </div>
  `;
}

const CHART_COLORS = ["#0071e3", "#34c759", "#ff9500", "#af52de", "#ff3b30", "#5ac8fa", "#ffcc00", "#8e8e93"];

function renderPieChart(items, unit) {
  if (!Array.isArray(items) || items.length === 0) return `<p class="muted">(データなし)</p>`;
  const total = items.reduce((s, it) => s + Number(it.value || 0), 0);
  if (total <= 0) return `<p class="muted">(合計0)</p>`;
  const cx = 130, cy = 130, r = 105;
  let ang = -Math.PI / 2;
  const slices = items.map((it, i) => {
    const v = Number(it.value || 0);
    const portion = v / total;
    const span = portion * Math.PI * 2;
    const x1 = cx + r * Math.cos(ang);
    const y1 = cy + r * Math.sin(ang);
    const end = ang + span;
    const x2 = cx + r * Math.cos(end);
    const y2 = cy + r * Math.sin(end);
    const large = span > Math.PI ? 1 : 0;
    ang = end;
    const color = CHART_COLORS[i % CHART_COLORS.length];
    // 単一スライス(1.0)は円全体として描画
    const path = items.length === 1
      ? `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx} ${cy + r} A ${r} ${r} 0 1 1 ${cx} ${cy - r} Z`
      : `M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`;
    return { path, color, label: it.label, value: v, pct: portion * 100 };
  });
  const paths = slices.map(s => `<path d="${s.path}" fill="${s.color}" stroke="#fff" stroke-width="2"/>`).join("");
  const legend = slices.map(s => `
    <div style="display:flex;align-items:center;gap:6px;font-size:13px;margin:3px 0">
      <span style="display:inline-block;width:14px;height:14px;background:${s.color};border-radius:3px;flex-shrink:0"></span>
      <span>${escapeHtml(s.label)}: ${s.value}${unit ? escapeHtml(unit) : ""} (${s.pct.toFixed(1)}%)</span>
    </div>
  `).join("");
  return `
    <div class="chart-wrap" style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">
      <svg width="260" height="260" viewBox="0 0 260 260" style="flex-shrink:0">${paths}</svg>
      <div style="min-width:220px">${legend}</div>
    </div>
  `;
}

function renderBarChart(categories, series, unit) {
  if (!Array.isArray(categories) || !Array.isArray(series) || series.length === 0) return `<p class="muted">(データなし)</p>`;
  const allVals = series.flatMap(s => (s.values || []).map(Number).filter(v => isFinite(v)));
  if (allVals.length === 0) return `<p class="muted">(数値データなし)</p>`;
  const maxVal = Math.max(...allVals, 0);
  if (maxVal <= 0) return `<p class="muted">(最大値0以下)</p>`;
  const W = 620, H = 340, padL = 60, padR = 20, padT = 30, padB = 60;
  const cw = W - padL - padR;
  const ch = H - padT - padB;
  const catCount = categories.length;
  const groupW = cw / catCount;
  const barW = Math.max(6, (groupW - 12) / series.length);

  let svg = `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" style="max-width:620px">`;
  const ticks = 5;
  for (let i = 0; i <= ticks; i++) {
    const tv = maxVal * i / ticks;
    const y = padT + ch - (i / ticks) * ch;
    svg += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#e5e5ea"/>`;
    svg += `<text x="${padL - 8}" y="${y + 4}" text-anchor="end" font-size="11" fill="#6e6e73">${Math.round(tv).toLocaleString()}</text>`;
  }
  for (let ci = 0; ci < catCount; ci++) {
    const gx = padL + ci * groupW;
    for (let si = 0; si < series.length; si++) {
      const v = Number((series[si].values || [])[ci]);
      if (!isFinite(v) || v <= 0) continue;
      const barH = (v / maxVal) * ch;
      const bx = gx + 6 + si * barW;
      const by = padT + ch - barH;
      const color = CHART_COLORS[si % CHART_COLORS.length];
      svg += `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${(barW - 2).toFixed(1)}" height="${barH.toFixed(1)}" fill="${color}"/>`;
    }
    svg += `<text x="${gx + groupW/2}" y="${H - padB + 18}" text-anchor="middle" font-size="12" fill="#1d1d1f">${escapeHtml(categories[ci])}</text>`;
  }
  svg += `<line x1="${padL}" y1="${padT + ch}" x2="${W - padR}" y2="${padT + ch}" stroke="#1d1d1f"/>`;
  svg += `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + ch}" stroke="#1d1d1f"/>`;
  if (unit) svg += `<text x="${padL - 4}" y="${padT - 10}" text-anchor="end" font-size="11" fill="#6e6e73">${escapeHtml(unit)}</text>`;
  svg += `</svg>`;

  const legend = series.map((s, i) => `
    <span style="display:inline-flex;align-items:center;gap:6px;margin-right:12px;font-size:13px">
      <span style="display:inline-block;width:12px;height:12px;background:${CHART_COLORS[i % CHART_COLORS.length]};border-radius:2px"></span>
      ${escapeHtml(s.name)}
    </span>
  `).join("");
  return `<div class="chart-wrap">${svg}<div style="margin-top:8px">${legend}</div></div>`;
}

function renderLineChart(categories, series, unit) {
  if (!Array.isArray(categories) || !Array.isArray(series) || series.length === 0) return `<p class="muted">(データなし)</p>`;
  const allVals = series.flatMap(s => (s.values || []).map(Number).filter(v => isFinite(v)));
  if (allVals.length === 0) return `<p class="muted">(数値データなし)</p>`;
  const maxVal = Math.max(...allVals);
  const minVal = Math.min(0, ...allVals);
  const range = (maxVal - minVal) || 1;
  const W = 620, H = 340, padL = 60, padR = 20, padT = 30, padB = 60;
  const cw = W - padL - padR;
  const ch = H - padT - padB;
  const catCount = categories.length;
  const stepX = cw / Math.max(1, catCount - 1);

  let svg = `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" style="max-width:620px">`;
  const ticks = 5;
  for (let i = 0; i <= ticks; i++) {
    const tv = minVal + range * i / ticks;
    const y = padT + ch - (i / ticks) * ch;
    svg += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#e5e5ea"/>`;
    svg += `<text x="${padL - 8}" y="${y + 4}" text-anchor="end" font-size="11" fill="#6e6e73">${Math.round(tv).toLocaleString()}</text>`;
  }
  for (let si = 0; si < series.length; si++) {
    const color = CHART_COLORS[si % CHART_COLORS.length];
    const vs = (series[si].values || []).map(Number);
    const points = vs.map((v, ci) => {
      if (!isFinite(v)) return null;
      const x = padL + ci * stepX;
      const y = padT + ch - ((v - minVal) / range) * ch;
      return { x, y };
    }).filter(Boolean);
    if (points.length === 0) continue;
    const d = points.map((p, i) => (i === 0 ? "M " : "L ") + p.x.toFixed(2) + " " + p.y.toFixed(2)).join(" ");
    svg += `<path d="${d}" fill="none" stroke="${color}" stroke-width="2.5"/>`;
    for (const p of points) svg += `<circle cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="4" fill="${color}"/>`;
  }
  for (let ci = 0; ci < catCount; ci++) {
    const x = padL + ci * stepX;
    svg += `<text x="${x}" y="${H - padB + 18}" text-anchor="middle" font-size="12" fill="#1d1d1f">${escapeHtml(categories[ci])}</text>`;
  }
  svg += `<line x1="${padL}" y1="${padT + ch}" x2="${W - padR}" y2="${padT + ch}" stroke="#1d1d1f"/>`;
  svg += `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + ch}" stroke="#1d1d1f"/>`;
  if (unit) svg += `<text x="${padL - 4}" y="${padT - 10}" text-anchor="end" font-size="11" fill="#6e6e73">${escapeHtml(unit)}</text>`;
  svg += `</svg>`;

  const legend = series.map((s, i) => `
    <span style="display:inline-flex;align-items:center;gap:6px;margin-right:12px;font-size:13px">
      <span style="display:inline-block;width:14px;height:2px;background:${CHART_COLORS[i % CHART_COLORS.length]}"></span>
      ${escapeHtml(s.name)}
    </span>
  `).join("");
  return `<div class="chart-wrap">${svg}<div style="margin-top:8px">${legend}</div></div>`;
}

function renderNumBody(p) {
  const d = p.chartData || {};
  let chartHtml;
  switch (p.chartType) {
    case "pie":  chartHtml = renderPieChart(d.pie_items, d.unit); break;
    case "bar":  chartHtml = renderBarChart(d.chart_categories, d.chart_series, d.unit); break;
    case "line": chartHtml = renderLineChart(d.chart_categories, d.chart_series, d.unit); break;
    case "table":
    case "table_blank":
    default:     chartHtml = renderMarkdownTable(d.table_markdown);
  }
  return `
    <div class="num-meta">
      <h3 class="table-theme">${escapeHtml(p.theme || "")}</h3>
      ${p.note ? `<p class="table-note">${escapeHtml(p.note)}</p>` : ""}
    </div>
    ${chartHtml}
  `;
}

/* ============================================================
   タイマー
============================================================ */
function startTimer() {
  state.startTime = Date.now();
  let lastElapsedMin = -1;
  state.timerInterval = setInterval(() => {
    state.timeRemaining -= 1;
    const elapsedMin = Math.floor((getDurationSec() - state.timeRemaining) / 60);
    if (elapsedMin !== lastElapsedMin) {
      lastElapsedMin = elapsedMin;
      updateStatusRow();
    }
    if (state.timeRemaining <= 0) { stopTimer(); finishTest(); }
  }, 1000);
}
function stopTimer() { if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; } }

function updateStatusRow() {
  const el = document.getElementById("timeStatusRow");
  if (!el) return;
  const elapsedMin = Math.floor((getDurationSec() - state.timeRemaining) / 60);
  const cls =
    state.timeRemaining <= 60 ? "danger" :
    state.timeRemaining <= 180 ? "warn" : "";
  el.className = "status-row " + cls;
  el.innerHTML = buildTimeRow(elapsedMin);
}
function buildTimeRow(elapsedMin) {
  const durMin = getMode().durationMin;
  return `
    <div>
      <span class="label">時間</span>　${elapsedMin}/${durMin}分
      <span class="bar">${renderBar(elapsedMin, durMin)}</span>
    </div>
  `;
}

/* ============================================================
   画面: アクセスパスワード（サーバー側で ACCESS_PASSWORD が設定されている場合）
============================================================ */
function renderAccessPrompt() {
  render(`
    <h1>🔒 アクセスパスワード</h1>
    <div class="panel">
      <p class="muted">このサイトはパスワード保護されています。</p>
      ${state.lastError ? `<div class="error">${escapeHtml(state.lastError)}</div>` : ""}
      <div class="field"><label>パスワード</label><input type="password" id="accessPw" autofocus></div>
      <div class="row"><button id="submitPw">OK</button></div>
    </div>
  `);
  const input = document.getElementById("accessPw");
  const submit = () => {
    state.accessToken = input.value.trim();
    localStorage.setItem("accessToken", state.accessToken);
    state.lastError = null;
    renderSetup();
  };
  document.getElementById("submitPw").addEventListener("click", submit);
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
}

/* ============================================================
   画面: セットアップ
============================================================ */
function renderSetup() {
  const history = loadHistory();
  const mode = getMode();

  const chain = state.chain;
  const totalDuration = chain.reduce((s, m) => s + MODES[m].durationMin, 0);
  const totalQs = chain.reduce((s, m) => s + MODES[m].numPassages * MODES[m].qsPerPassage, 0);
  const modeCards = Object.keys(CHAINS).map(ui => {
    const modes = CHAINS[ui];
    const minutes = modes.reduce((s, m) => s + MODES[m].durationMin, 0);
    const questions = modes.reduce((s, m) => s + MODES[m].numPassages * MODES[m].qsPerPassage, 0);
    return `
      <button type="button" class="lang-btn mode-card ${state.uiMode === ui ? "active" : ""}" data-ui="${ui}">
        <span class="mode-title">${escapeHtml(CHAIN_LABELS[ui])}</span>
        <span class="mode-meta">${minutes}分 / ${questions}問</span>
      </button>
    `;
  }).join("");
  const flowItems = chain.map((m, idx) => `
    <div class="setup-flow-item">
      <strong>${idx + 1}. ${escapeHtml(MODES[m].label)}</strong>
      <span class="muted">${MODES[m].durationMin}分 / ${MODES[m].numPassages * MODES[m].qsPerPassage}問</span>
    </div>
  `).join("");
  const formatBody = isCombo() ? `
    <p class="setup-copy">選択したタイプは、以下のセクションを順に受験します。</p>
    <div class="setup-flow-list">${flowItems}</div>
  ` : (
    mode.id === "ja" ? `
      <p class="setup-copy">
        各長文につき4つの記述を読み、A・B・Cで論理判定します。
      </p>
      <div class="setup-flow-list">
        <div class="setup-flow-item"><strong>A</strong><span class="muted">${JA_CHOICES[0]}</span></div>
        <div class="setup-flow-item"><strong>B</strong><span class="muted">${JA_CHOICES[1]}</span></div>
        <div class="setup-flow-item"><strong>C</strong><span class="muted">${JA_CHOICES[2]}</span></div>
      </div>
    ` : mode.id === "en" ? `
      <p class="setup-copy">英文の会話文・短文を読み、各設問で5択から最も適切な選択肢を選びます。</p>
    ` : `
      <p class="setup-copy">表・円グラフ・棒グラフ・折れ線グラフから数値を読み取り、5択で解答します。</p>
    `
  );

  render(`
    <div class="diagnosis-start">
      <section class="setup-hero">
        <div class="setup-hero-top">
          <div>
            <span class="setup-eyebrow">WEB TEST</span>
            <h1 class="diagnosis-title">${escapeHtml(CHAIN_LABELS[state.uiMode])}</h1>
          </div>
        </div>
        <div class="setup-metrics">
          <div class="metric-tile">
            <span class="metric-label">所要時間</span>
            <span class="metric-value">${totalDuration}分</span>
          </div>
          <div class="metric-tile">
            <span class="metric-label">設問数</span>
            <span class="metric-value">${totalQs}問</span>
          </div>
        </div>
      </section>

      ${state.lastError ? `<div class="error">${escapeHtml(state.lastError)}</div>` : ""}
      <div id="prefetchStatus"></div>

      <section class="setup-section">
        <span class="setup-eyebrow">TEST MENU</span>
        <h2>テスト選択</h2>
        <div class="mode-card-grid">
          ${modeCards}
        </div>
      </section>

      <section class="setup-section">
        <span class="setup-eyebrow">SESSION</span>
        <h2>${isCombo() ? "受験セクション" : "問題形式"}</h2>
        ${formatBody}
      </section>

      <div class="setup-action-row">
        <p class="muted">次の問題へ進むと戻れません。</p>
        <div class="row">
          <button class="secondary" id="historyBtn">履歴 ${history.length}</button>
          <button class="start-btn-big" id="startBtn">診断を開始</button>
        </div>
      </div>
    </div>
  `);

  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => setLanguage(btn.dataset.ui));
  });
  document.getElementById("startBtn").addEventListener("click", startTest);
  document.getElementById("historyBtn").addEventListener("click", renderHistory);

  ensureGenerationStarted();
  updatePrefetchStatus();
}

function setLanguage(ui) {
  if (!CHAINS[ui] || state.uiMode === ui) return;
  state.uiMode = ui;
  localStorage.setItem("uiMode", ui);
  state.chain = CHAINS[ui].slice();
  state.chainIdx = 0;
  state.chainResults = [];
  state.language = state.chain[0];
  state.generationId += 1;
  state.generationStarted = false;
  state.passages = [];
  state.passagePromises = null;
  state.passageErrors = {};
  state.passageProgress = [];
  state.testStarted = false;
  state.answers = {};
  state.currentIdx = 0;
  state.timeRemaining = getDurationSec();
  renderSetup();
}

/* ============================================================
   画面: 準備中
============================================================ */
function renderLoading() {
  const total = getNumPassages();
  const mode = getMode();
  const done = state.passages.filter(p => p).length;
  const pct = Math.round((done / total) * 100);
  const progress = state.passageProgress || new Array(total).fill(0);
  const label = mode.id === "num" ? "問" : "長文";
  const rows = [];
  for (let i = 0; i < total; i++) {
    const ready = !!state.passages[i];
    const err = state.passageErrors && state.passageErrors[i];
    const chars = progress[i] || 0;
    let statusHtml;
    if (ready) statusHtml = `<span style="color:var(--correct);font-weight:600">✓ 完了</span>`;
    else if (err) statusHtml = `<span style="color:var(--wrong)">× ${escapeHtml(err.slice(0, 40))}</span>`;
    else if (chars > 0) statusHtml = `<span class="muted">生成中... ${chars}文字受信</span>`;
    else statusHtml = `<span class="muted">生成中...</span>`;
    rows.push(`
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px">
        <span>${label} ${i + 1}</span>
        ${statusHtml}
      </div>
    `);
  }
  render(`
    <h1>問題を準備中...</h1>
    <div class="panel">
      <p class="muted">問題を準備しています...</p>
      <div class="progress-bar" style="margin:16px 0"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <p style="text-align:center;font-size:14px;font-weight:600">${done} / ${total} ${label}完了</p>
      <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px">
        ${rows.join("")}
      </div>
    </div>
  `);
}

/* ============================================================
   画面: テスト
============================================================ */
function renderTest() {
  const mode = getMode();
  const totalQ = getTotalQs();
  const pIdx = Math.floor(state.currentIdx / mode.qsPerPassage);
  const qIdx = state.currentIdx % mode.qsPerPassage;
  const passage = state.passages[pIdx];

  if (!passage) {
    const err = state.passageErrors[pIdx];
    render(`
      <div class="panel" style="text-align:center">
        <h2>問${state.currentIdx + 1}</h2>
        ${err
          ? `<div class="error">この問題の生成に失敗しました: ${escapeHtml(err)}</div>
             <button class="next-btn" id="skipBtn">[ スキップ ]</button>`
          : `<p class="muted">生成中です...</p>
             <div class="progress-bar" style="margin:16px 0"><div class="progress-bar-fill" style="width:60%;animation:pulse 1.2s ease-in-out infinite"></div></div>`
        }
      </div>
    `);
    if (err) {
      document.getElementById("skipBtn").addEventListener("click", () => {
        if (state.currentIdx < totalQ - 1) { state.currentIdx += 1; renderTest(); }
        else finishTest();
      });
    }
    return;
  }

  const question = passage.questions[qIdx];
  const selectedIdx = state.answers[state.currentIdx];
  const locked = selectedIdx !== undefined;
  const correctIdx = question.correct_index;
  const isCorrect = locked && selectedIdx === correctIdx;
  const answeredCount = Object.keys(state.answers).length;
  const isLast = state.currentIdx === totalQ - 1;
  const elapsedMin = Math.floor((getDurationSec() - state.timeRemaining) / 60);
  const timeCls =
    state.timeRemaining <= 60 ? "danger" :
    state.timeRemaining <= 180 ? "warn" : "";

  // 本文（モードにより切替）
  let passageHtml;
  if (mode.id === "num") {
    passageHtml = renderNumBody(passage);
  } else {
    passageHtml = `<div class="passage-block">${escapeHtml(passage.passage)}</div>`;
  }

  render(`
    <div class="panel">
      ${mode.showFaqLink ? `<div class="faq-link">正しく受験できない方はFAQをご覧ください</div>` : ""}
      <div>
        <span class="q-num">問${state.currentIdx + 1}</span>
        <span class="q-lead">${escapeHtml(mode.leadText)}</span>
      </div>
      ${passageHtml}

      <hr class="divider">

      <div class="q-statement">${escapeHtml(question.statement)}</div>

      <hr class="divider">

      <div class="choices-radio">
        ${question.choices.map((text, idx) => {
          const classes = ["choice-row"];
          if (selectedIdx === idx) classes.push("selected");
          if (locked) classes.push("locked");
          if (locked && idx === correctIdx) classes.push("reveal-correct");
          if (locked && idx === selectedIdx && !isCorrect) classes.push("reveal-wrong");
          const icon = locked
            ? (idx === correctIdx ? "○" : (idx === selectedIdx ? "×" : "◯"))
            : (selectedIdx === idx ? "●" : "◯");
          const labelPart = mode.choiceLabels ? `<strong>${mode.choiceLabels[idx]}.</strong> ` : "";
          return `
            <div class="${classes.join(" ")}" data-idx="${idx}">
              <span class="radio-icon">${icon}</span>
              <span>${labelPart}${escapeHtml(text)}</span>
            </div>
          `;
        }).join("")}
      </div>

      ${locked ? `
        <div class="feedback-banner ${isCorrect ? "ok" : "ng"}">
          ${isCorrect ? "○ 正解!" : "× 不正解"}
        </div>
      ` : ""}

      <div class="status-row">
        <div>
          <span class="label">回答数</span>　${answeredCount}/${totalQ}問
          <span class="bar">${renderBar(answeredCount, totalQ)}</span>
        </div>
      </div>
      <div id="timeStatusRow" class="status-row ${timeCls}">
        ${buildTimeRow(elapsedMin)}
      </div>
      <div style="display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-top:12px">
        ${locked ? "" : `<span class="muted" style="font-size:12px">解答を選択してください</span>`}
        <button class="next-btn" id="nextBtn" ${locked ? "" : "disabled"}>[ ${isLast ? "採点する" : "次へ進む"} ]</button>
      </div>

      <div class="warn-bottom">
        <span>制限時間は${mode.durationMin}分です。</span>
        <span>※次の問題へ進むと戻れません。</span>
      </div>
    </div>
  `);

  // 問題表示時刻を記録（回答時の所要時間計算用）
  if (state.answers[state.currentIdx] === undefined) {
    if (!state.questionStartTs || state._lastRenderedIdx !== state.currentIdx) {
      state.questionStartTs = Date.now();
      state._lastRenderedIdx = state.currentIdx;
    }
  }

  document.querySelectorAll(".choice-row").forEach(row => {
    row.addEventListener("click", () => {
      if (state.answers[state.currentIdx] !== undefined) return;
      const idx = parseInt(row.dataset.idx, 10);
      state.answers[state.currentIdx] = idx;
      if (state.questionStartTs) {
        state.answerTimes[state.currentIdx] = Math.max(1, Math.round((Date.now() - state.questionStartTs) / 1000));
      }
      if (idx === question.correct_index) playCorrectSound();
      renderTest();
    });
  });
  document.getElementById("nextBtn").addEventListener("click", () => {
    if (isLast) {
      if (confirm("採点しますか？")) finishTest();
    } else {
      state.currentIdx += 1;
      renderTest();
    }
  });
}

/* ============================================================
   画面: 結果
============================================================ */
function renderResults(result) {
  const combined = result.combined || [{ mode: state.language, ...result }];
  const totalScore = combined.reduce((s, r) => s + r.score, 0);
  const totalAll = combined.reduce((s, r) => s + r.total, 0);
  const totalElapsed = combined.reduce((s, r) => s + r.elapsedSec, 0);
  const pct = totalAll > 0 ? Math.round((totalScore / totalAll) * 100) : 0;
  const answeredAll = combined.reduce((sum, r) => sum + (r.detail || []).filter(d => d.userIdx !== null && d.userIdx !== undefined).length, 0);
  const completionPct = totalAll > 0 ? Math.round((answeredAll / totalAll) * 100) : 0;
  const m = Math.floor(totalElapsed / 60);
  const s = totalElapsed % 60;

  const sectionSummaries = combined.length > 1 ? `
    <section class="section-score-panel">
      <span class="setup-eyebrow">SECTION SCORES</span>
      <h2>セクション別スコア</h2>
      ${combined.map(r => `
        <div class="section-score-row">
          <strong>${escapeHtml(MODES[r.mode].label)}</strong>

          <span>${r.score} / ${r.total}</span>
        </div>
      `).join("")}
    </section>
  ` : "";

  // 全セクションのdetailを globalIdx オフセット付きで1つにまとめる
  let idxOffset = 0;
  const sections = combined.map((r, secIdx) => {
    const sec = {
      modeLabel: MODES[r.mode].label,
      detail: r.detail.map(d => ({ ...d, _absIdx: d.globalIdx + idxOffset, _secIdx: secIdx }))
    };
    idxOffset += r.total;
    return sec;
  });

  render(`
    <div class="result-shell">
      <section class="result-hero">
        <div>
          <span class="setup-eyebrow">RESULT</span>
          <h1 class="result-title">結果</h1>
          <p class="result-profile-line">${escapeHtml(CHAIN_LABELS[state.uiMode] || state.uiMode)} ・ ${totalScore} / ${totalAll} ・ 総所要 ${m}分${s}秒</p>
        </div>
        <div class="result-score-ring" style="--score:${pct}">
          <div class="result-score-ring-inner">
            <div>
              <strong>${pct}%</strong>
              <span>${totalScore} / ${totalAll}</span>
            </div>
          </div>
        </div>
      </section>

      <div class="result-metrics">
        <div class="metric-tile">
          <span class="metric-label">正答率</span>
          <span class="metric-value">${pct}%</span>
        </div>
        <div class="metric-tile">
          <span class="metric-label">回答完了</span>
          <span class="metric-value">${completionPct}%</span>
        </div>
        <div class="metric-tile">
          <span class="metric-label">総所要</span>
          <span class="metric-value">${m}分${s}秒</span>
        </div>
      </div>

      ${sectionSummaries}
      ${sections.map((sec, si) => `
      <section class="explain-section">
        <div class="explain-header">
          <div>
            <span class="explain-kicker">${combined.length > 1 ? escapeHtml(sec.modeLabel) : "ANSWER REVIEW"}</span>
            <h2>${combined.length > 1 ? `${escapeHtml(sec.modeLabel)}の解説` : "解答・解説"}</h2>
          </div>
          <span class="muted">項目を選択して詳細を表示</span>
        </div>
        ${sec.detail.map((d) => {
          const i = d._absIdx;
          return `
          <div class="explain-card">
            <div class="explain-head" data-toggle="${i}">
              <div class="question-type">
                <span class="question-number">Q${d.globalIdx + 1}</span>
                <div class="question-summary">
                  <strong>${escapeHtml(d.statement)}</strong>
                  <span>${d.userIdx !== null && d.userIdx !== undefined ? "回答済み" : "未回答"} / ${d.isCorrect ? "正解" : "不正解"}</span>
                </div>
              </div>
              <span class="answer-state ${d.isCorrect ? "correct" : "wrong"}">${d.isCorrect ? "MATCH" : "REVIEW"}</span>
            </div>
            <div class="breakdown-detail" id="detail-${i}">
              <div class="answer-detail-grid">
                <div class="answer-box">
                  <span>あなたの解答</span>
                  <strong>${d.userIdx !== null && d.userIdx !== undefined ? escapeHtml(d.choices[d.userIdx] || "") : "未回答"}</strong>
                </div>
                <div class="answer-box">
                  <span>正解</span>
                  <strong>${escapeHtml(d.choices[d.correctIdx] || "")}</strong>
                </div>
              </div>
              <p><strong>解説:</strong> ${escapeHtml(d.explanation)}</p>
              <details style="margin-top:8px">
                <summary class="muted">本文を見る</summary>

                  ? renderNumBody({ theme: d.theme, note: d.note, chartType: d.chartType, chartData: d.chartData })

    `).join("")}
      <div class="row result-actions">

  document.getElementById("restartBtn").addEventListener("click", resetAndSetup);
  document.getElementById("homeBtn").addEventListener("click", resetAndSetup);

/* ============================================================
   フロー
============================================================ */
async function startTest() {
  state.lastError = null;
  ensureGenerationStarted();

  state.answers = {};
  state.answerTimes = {};      // globalIdx -> time_spent_sec
  state.questionStartTs = null;
  if (!state.sessionId) {
    // chain 全体で 1 セッション ID
    state.sessionId = (crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now() + "-" + Math.random().toString(16).slice(2));
  }
  state.currentIdx = 0;
  state.timeRemaining = getDurationSec();

  // 最初の1本が準備できていれば即テスト開始。残りはバックグラウンドで順次生成
  if (state.passages[0]) {
    state.testStarted = true;
    renderTest();
    startTimer();
    return;
  }

  renderLoading();
  const tick = setInterval(() => { if (!state.testStarted) renderLoading(); }, 300);

  try {
    await state.passagePromises[0];
  } catch (e) {
    clearInterval(tick);
    state.lastError = "最初の問題の生成に失敗しました: " + (e.message || e);
    state.generationStarted = false;
    renderSetup();
    return;
  }
  clearInterval(tick);

  state.testStarted = true;
  renderTest();
  startTimer();
}

function finishCurrentSection() {
  stopTimer();
  const mode = getMode();
  const totalQ = getTotalQs();
  const elapsedSec = getDurationSec() - state.timeRemaining;
  let score = 0;
  const detail = [];
  for (let globalIdx = 0; globalIdx < totalQ; globalIdx++) {
    const pIdx = Math.floor(globalIdx / mode.qsPerPassage);
    const qIdx = globalIdx % mode.qsPerPassage;
    const p = state.passages[pIdx];
    if (!p) {
      detail.push({
        globalIdx, passageIdx: pIdx,
        passage: "(生成されませんでした)",
        statement: "(生成されませんでした)",
        choices: [],
        correctIdx: -1,
        userIdx: state.answers[globalIdx] !== undefined ? state.answers[globalIdx] : null,
        isCorrect: false,
        explanation: "この問題は生成が間に合いませんでした。",
        isNum: mode.id === "num"
      });
      continue;
    }
    const q = p.questions[qIdx];
    const user = state.answers[globalIdx];
    const isCorrect = user === q.correct_index;
    if (isCorrect) score += 1;
    detail.push({
      globalIdx, passageIdx: pIdx,
      passage: p.passage,
      theme: p.theme || "",
      note: p.note || "",
      chartType: p.chartType || "",
      chartData: p.chartData || null,
      statement: q.statement,
      choices: q.choices,
      correctIdx: q.correct_index,
      userIdx: user !== undefined ? user : null,
      isCorrect,
      explanation: q.explanation,
      isNum: mode.id === "num"
    });
  }
  const sectionResult = { mode: state.language, score, total: totalQ, elapsedSec, detail };
  state.chainResults.push(sectionResult);

  if (state.chainIdx + 1 < state.chain.length) {
    // 次のセクションへ遷移
    state.chainIdx += 1;
    state.language = state.chain[state.chainIdx];
    state.generationId += 1;
    state.generationStarted = false;
    state.passages = [];
    state.passagePromises = null;
    state.passageErrors = {};
    state.passageProgress = [];
    state.answers = {};
    state.currentIdx = 0;
    state.timeRemaining = getDurationSec();
    state.testStarted = false;
    renderSectionTransition(sectionResult);
    return;
  }

  // 全セクション完了 → 集計して結果表示
  const combined = state.chainResults;
  const completedSessionId = state.sessionId || ((crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now() + "-" + Math.random().toString(16).slice(2)));
  const totalScore = combined.reduce((s, r) => s + r.score, 0);
  const totalAll = combined.reduce((s, r) => s + r.total, 0);
  const totalElapsed = combined.reduce((s, r) => s + r.elapsedSec, 0);
  saveHistory({
    date: new Date().toISOString(),
    language: state.uiMode,
    score: totalScore, total: totalAll, elapsedSec: totalElapsed
  });
  saveTestResultsOffline(combined, state.uiMode, completedSessionId);
  // プロフィール登録ゲート: 結果・解説表示前に同意付きプロフィール登録を必須化
  state._pendingResults = { combined, sessionId: completedSessionId };
  renderProfileGate();
}

function renderProfileGate() {
  render(`
    <h1>プロフィール登録</h1>
    <p class="muted">お疲れ様でした！解説を見る前にプロフィールを登録して、限定の企業スカウトを受け取りましょう。</p>
    <div id="profileError"></div>
    <div class="panel">
      <form id="profileGateForm" novalidate>
        <div class="profile-grid">
          <div class="field">
            <label for="profileFullName">氏名（漢字）</label>
            <input id="profileFullName" type="text" autocomplete="name" data-profile-required>
          </div>
          <div class="field">
            <label for="profileKana">フリガナ</label>
            <input id="profileKana" type="text" autocomplete="name" data-profile-required>
          </div>
          <div class="field">
            <label for="profileUniversity">大学名</label>
            <input id="profileUniversity" type="search" list="profileUniversityList" autocomplete="organization" placeholder="大学名を入力・検索" data-profile-required>
            <datalist id="profileUniversityList"></datalist>
            <div class="hint">候補から大学名を選択してください。</div>
          </div>
          <div class="field">
            <label for="profileDepartment">学部</label>
            <select id="profileDepartment" data-profile-required disabled>
              <option value="">大学を選択してください</option>
            </select>
          </div>
          <div class="field">
            <label for="profileGradYear">卒業年度</label>
            <select id="profileGradYear" data-profile-required>
              <option value="">選択してください</option>
              <option value="2027">2027年卒</option>
              <option value="2028">2028年卒</option>
              <option value="2029">2029年卒</option>
              <option value="2030">2030年卒</option>
              <option value="2031">2031年卒</option>
              <option value="2032">2032年卒</option>
            </select>
          </div>
          <div class="field">
            <label for="profileEmail">メールアドレス</label>
            <input id="profileEmail" type="email" autocomplete="email" inputmode="email" data-profile-required>
          </div>
          <div class="field full">
            <label for="profilePhone">電話番号</label>
            <input id="profilePhone" type="tel" autocomplete="tel" inputmode="tel" data-profile-required>
          </div>
        </div>

        <div class="field" style="margin-top:18px">
          <label>${escapeHtml(PROFILE_TERMS_TITLE)}</label>
          <div class="privacy-excerpt terms-excerpt" tabindex="0">
            ${renderLegalText(PROFILE_LEGAL_TEXT)}
          </div>
        </div>

        <div class="consent-row">
          <input id="profileConsent" type="checkbox">
          <label for="profileConsent">正式会員登録規約およびプライバシーポリシー（提携企業への個人情報の第三者提供を含む）に同意する</label>
        </div>

        <div class="row" style="margin-top:8px">
          <button id="profileSubmit" type="submit" class="start-btn-big" style="font-size:15px;padding:12px 28px" disabled>解説を見る</button>
        </div>
      </form>
    </div>
  `);

  const form = document.getElementById("profileGateForm");
  const requiredFields = Array.from(form.querySelectorAll("[data-profile-required]"));
  const consent = document.getElementById("profileConsent");
  const submitBtn = document.getElementById("profileSubmit");
  const errEl = document.getElementById("profileError");
  const universityEl = document.getElementById("profileUniversity");
  const universityListEl = document.getElementById("profileUniversityList");
  const departmentEl = document.getElementById("profileDepartment");
  let schoolMaster = [];

  const populateDepartments = (universityName, selectedDepartment = "") => {
    const school = getSchoolByName(schoolMaster, universityName.trim());
    const faculties = school?.faculties || [];
    departmentEl.disabled = !school;
    departmentEl.innerHTML = school
      ? renderDepartmentSelectOptions(faculties, selectedDepartment)
      : '<option value="">大学名を候補から選択してください</option>';
  };

  const isFormReady = () =>
    requiredFields.every(el =>
      el.value.trim() &&
      (el.type !== "email" || el.checkValidity()) &&
      (el.id !== "profileUniversity" || !!getSchoolByName(schoolMaster, el.value.trim()))
    ) &&
    consent.checked;

  const syncSubmit = () => {
    submitBtn.disabled = !isFormReady();
    errEl.innerHTML = "";
  };

  requiredFields.forEach(el => {
    el.addEventListener("input", syncSubmit);
    el.addEventListener("change", syncSubmit);
  });
  universityEl.addEventListener("input", () => {
    populateDepartments(universityEl.value);
    syncSubmit();
  });
  universityEl.addEventListener("change", () => {
    populateDepartments(universityEl.value);
    syncSubmit();
  });
  consent.addEventListener("change", syncSubmit);
  syncSubmit();

  Promise.all([
    window.AuthApp?.getSchoolMaster?.() || Promise.resolve([]),
    window.AuthApp?.getUser?.() || Promise.resolve(null)
  ]).then(([master, user]) => {
    schoolMaster = Array.isArray(master) ? master : [];
    const selectedUniversity = user?.university || "";
    universityListEl.innerHTML = renderUniversitySearchOptions(schoolMaster);
    universityEl.value = getSchoolByName(schoolMaster, selectedUniversity) ? selectedUniversity : "";
    populateDepartments(universityEl.value, user?.department || "");
    if (user?.email && !document.getElementById("profileEmail").value) document.getElementById("profileEmail").value = user.email;
    if (user?.graduation_year && !document.getElementById("profileGradYear").value) document.getElementById("profileGradYear").value = user.graduation_year;
    syncSubmit();
  }).catch(() => {
    universityListEl.innerHTML = "";
    universityEl.placeholder = "大学マスターを読み込めませんでした";
    departmentEl.innerHTML = '<option value="">大学を選択してください</option>';
    departmentEl.disabled = true;
    syncSubmit();
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!isFormReady()) return;
    const pending = state._pendingResults;
    if (!pending?.combined) {
      errEl.innerHTML = '<div class="error">テスト結果の取得に失敗しました。もう一度お試しください。</div>';
      window.scrollTo(0, 0);
      return;
    }

    const profile = {
      full_name: document.getElementById("profileFullName").value.trim(),
      furigana: document.getElementById("profileKana").value.trim(),
      university: document.getElementById("profileUniversity").value.trim(),
      department: document.getElementById("profileDepartment").value.trim(),
      graduation_year: document.getElementById("profileGradYear").value,
      email: document.getElementById("profileEmail").value.trim().toLowerCase(),
      phone: document.getElementById("profilePhone").value.trim()
    };

    const payload = buildProfilePayload(profile, pending.combined, state.uiMode, pending.sessionId);
    submitBtn.disabled = true;
    submitBtn.textContent = "保存中...";

    try {
      if (!window.AuthApp?.saveProfileAndResults) throw new Error("保存機能を読み込めませんでした");
      await window.AuthApp.saveProfileAndResults(payload);
      const result = { combined: pending.combined };
      state._pendingResults = null;
      renderResults(result);
    } catch (err) {
      submitBtn.textContent = "解説を見る";
      submitBtn.disabled = false;
      errEl.innerHTML = `<div class="error">${escapeHtml(err.message || String(err))}</div>`;
      window.scrollTo(0, 0);
    }
  });
}

// 各セクションの結果 + 全回答詳細をこのブラウザ内に保存
async function saveTestResultsOffline(sections, uiMode, sessionId) {
  const user = await window.AuthApp?.getUser?.();
  const attemptSessionId = sessionId || state.sessionId || crypto?.randomUUID?.() || `local_${Date.now()}`;
  const qsPerPassageMap = { ja: 4, en: 3, num: 1 };
  const answerRows = [];

  for (const s of sections) {
    const qpp = qsPerPassageMap[s.mode] || 1;
    for (const d of s.detail || []) {
      if (d.correctIdx < 0) continue;
      const ti = state.answerTimes || {};
      answerRows.push({
        mode: s.mode,
        section_index: d.passageIdx,
        question_index: (typeof d.globalIdx === "number" && qpp) ? (d.globalIdx % qpp) : 0,
        global_index: d.globalIdx,
        selected_index: (d.userIdx === null || d.userIdx === undefined) ? null : d.userIdx,
        correct_index: d.correctIdx,
        is_correct: !!d.isCorrect,
        time_spent_sec: ti[d.globalIdx] || null
      });
    }
  }

  window.AuthApp?.saveAttempt?.({
    user_id: user?.id || null,
    user_email: user?.email || null,
    session_id: attemptSessionId,
    ui_mode: uiMode,
    sections: sections.map(s => ({
      mode: s.mode,
      score: s.score,
      total: s.total,
      duration_sec: s.elapsedSec
    })),
    answers: answerRows,
    user_agent: navigator.userAgent.slice(0, 300)
  });
  state.sessionId = null;
}

function finishTest() { finishCurrentSection(); }

function renderSectionTransition(prevResult) {
  const prevMode = MODES[prevResult.mode];
  const nextMode = getMode();
  const nextQ = getTotalQs();
  ensureGenerationStarted();
  render(`
    <h1>セクション完了</h1>
    <div class="panel">
      <h2>${escapeHtml(prevMode.label)} セクション 結果</h2>
      <div class="score-big">${prevResult.score} / ${prevResult.total}</div>
      <div class="score-sub">正答率 ${Math.round(prevResult.score / prevResult.total * 100)}% ・ 所要 ${Math.floor(prevResult.elapsedSec/60)}分${prevResult.elapsedSec%60}秒</div>
    </div>

    <div class="panel">
      <h2>次のセクション: ${escapeHtml(nextMode.label)}</h2>
      <p class="muted">${nextMode.durationMin}分 / ${nextQ}問 （${state.chainIdx + 1}/${state.chain.length} セクション目）</p>
      <div id="prefetchStatus"></div>
      <div class="row" style="margin-top:12px">
        <button id="nextSectionBtn">次のセクションを開始</button>
      </div>
    </div>
  `);
  updatePrefetchStatus();
  document.getElementById("nextSectionBtn").addEventListener("click", startTest);
}

function resetAndSetup() {
  stopTimer();
  state.chain = CHAINS[state.uiMode].slice();
  state.chainIdx = 0;
  state.chainResults = [];
  state.language = state.chain[0];
  state.passages = [];
  state.passagePromises = null;
  state.passageErrors = {};
  state.passageProgress = [];
  state.generationStarted = false;
  state.testStarted = false;
  state.answers = {};
  state.currentIdx = 0;
  state.timeRemaining = getDurationSec();
  state.lastError = null;
  renderSetup();
}


/* 起動: 認証は任意。API や外部サービスには接続しない。 */
(async function bootstrap() {
  await window.AuthApp?.ready;
  renderSetup();
})();
</script>
