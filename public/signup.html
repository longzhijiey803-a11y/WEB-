<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規登録 — WEBテスト練習</title>
<script src="auth-common.js"></script>
</head>
<body>
<div class="container">
  <h1>新規登録</h1>
  <p class="muted">WEBテスト練習のローカルアカウントを作成します。情報はこのブラウザ内だけに保存され、外部送信されません。</p>

  <div id="msg"></div>

  <div class="panel">
    <form id="f">
      <div class="field">
        <label>メールアドレス（必須）</label>
        <input type="email" id="email" required autocomplete="email">
        <div class="hint">ログインIDおよび通知用。</div>
      </div>
      <div class="field">
        <label>パスワード（必須、8文字以上）</label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password">
        <div class="hint">このブラウザ内にハッシュ化して保存します。外部サービスには送信しません。</div>
      </div>
      <div class="field">
        <label>ニックネーム（必須）</label>
        <input type="text" id="nickname" required maxlength="60">
        <div class="hint">匿名性担保のためニックネームでも可。</div>
      </div>
      <div class="field">
        <label>所属大学名（必須）</label>
        <select id="university_select" required>
          <option value="">選択してください</option>
          <optgroup label="国立大学">
            <option>東京大学</option>
            <option>京都大学</option>
            <option>大阪大学</option>
            <option>東北大学</option>
            <option>名古屋大学</option>
            <option>北海道大学</option>
            <option>九州大学</option>
            <option>一橋大学</option>
            <option>東京科学大学</option>
            <option>筑波大学</option>
            <option>千葉大学</option>
            <option>横浜国立大学</option>
            <option>神戸大学</option>
            <option>広島大学</option>
            <option>岡山大学</option>
            <option>金沢大学</option>
            <option>新潟大学</option>
            <option>東京外国語大学</option>
            <option>東京学芸大学</option>
            <option>お茶の水女子大学</option>
            <option>奈良女子大学</option>
            <option>電気通信大学</option>
            <option>東京農工大学</option>
            <option>熊本大学</option>
            <option>長崎大学</option>
            <option>信州大学</option>
            <option>静岡大学</option>
            <option>岐阜大学</option>
            <option>三重大学</option>
            <option>滋賀大学</option>
            <option>京都工芸繊維大学</option>
            <option>和歌山大学</option>
            <option>山口大学</option>
            <option>徳島大学</option>
            <option>愛媛大学</option>
            <option>香川大学</option>
            <option>鹿児島大学</option>
            <option>琉球大学</option>
          </optgroup>
          <optgroup label="公立大学">
            <option>大阪公立大学</option>
            <option>東京都立大学</option>
            <option>横浜市立大学</option>
            <option>名古屋市立大学</option>
            <option>京都府立大学</option>
            <option>兵庫県立大学</option>
            <option>国際教養大学</option>
            <option>会津大学</option>
          </optgroup>
          <optgroup label="私立大学（関東）">
            <option>早稲田大学</option>
            <option>慶應義塾大学</option>
            <option>上智大学</option>
            <option>東京理科大学</option>
            <option>国際基督教大学(ICU)</option>
            <option>明治大学</option>
            <option>青山学院大学</option>
            <option>立教大学</option>
            <option>中央大学</option>
            <option>法政大学</option>
            <option>学習院大学</option>
            <option>成蹊大学</option>
            <option>成城大学</option>
            <option>明治学院大学</option>
            <option>武蔵大学</option>
            <option>國學院大學</option>
            <option>芝浦工業大学</option>
            <option>東京都市大学</option>
            <option>東京電機大学</option>
            <option>日本大学</option>
            <option>東洋大学</option>
            <option>駒澤大学</option>
            <option>専修大学</option>
            <option>津田塾大学</option>
            <option>東京女子大学</option>
            <option>日本女子大学</option>
            <option>獨協大学</option>
            <option>神奈川大学</option>
            <option>東海大学</option>
            <option>亜細亜大学</option>
            <option>帝京大学</option>
          </optgroup>
          <optgroup label="私立大学(関西)">
            <option>同志社大学</option>
            <option>関西学院大学</option>
            <option>立命館大学</option>
            <option>関西大学</option>
            <option>近畿大学</option>
            <option>甲南大学</option>
            <option>京都産業大学</option>
            <option>龍谷大学</option>
            <option>関西外国語大学</option>
            <option>京都女子大学</option>
            <option>同志社女子大学</option>
            <option>神戸女学院大学</option>
          </optgroup>
          <optgroup label="私立大学（その他）">
            <option>南山大学</option>
            <option>名城大学</option>
            <option>中京大学</option>
            <option>愛知大学</option>
            <option>愛知淑徳大学</option>
            <option>福岡大学</option>
            <option>西南学院大学</option>
            <option>東北学院大学</option>
            <option>北海学園大学</option>
            <option>立命館アジア太平洋大学(APU)</option>
          </optgroup>
          <option value="__other__">その他（自由入力）</option>
        </select>
        <input type="text" id="university_other" maxlength="120" placeholder="大学名を入力してください" style="margin-top:8px;display:none">
      </div>
      <div class="field">
        <label>卒業予定年度(必須)</label>
        <select id="graduation_year" required>
          <option value="">選択してください</option>
          <option>2025年卒</option>
          <option>2026年卒</option>
          <option>2027年卒</option>
          <option>2028年卒</option>
          <option>2029年卒</option>
          <option>2030年卒</option>
          <option>既卒 / その他</option>
        </select>
      </div>
      <div class="field">
        <label>第一志望の業界(任意)</label>
        <select id="first_choice_industry">
          <option value="">未回答</option>
          <option>コンサルティング</option>
          <option>総合商社</option>
          <option>金融・銀行</option>
          <option>証券・投資</option>
          <option>保険</option>
          <option>メーカー（電機・機械）</option>
          <option>メーカー（食品・化学）</option>
          <option>IT・ソフトウェア</option>
          <option>通信・インターネット</option>
          <option>広告・マーケティング</option>
          <option>マスコミ・出版</option>
          <option>インフラ（電力・ガス・鉄道）</option>
          <option>不動産・建設</option>
          <option>医療・製薬</option>
          <option>教育</option>
          <option>公務員</option>
          <option>その他</option>
        </select>
        <div class="hint">ダッシュボードのパーソナライズに利用します（非公開）。</div>
      </div>

      <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">

      <div class="consent-row">
        <input type="checkbox" id="consent_terms" required>
        <label for="consent_terms" style="color:var(--text);font-size:14px;margin:0;cursor:pointer">
          <a href="terms.html" target="_blank" class="link">利用規約</a>・<a href="privacy.html" target="_blank" class="link">プライバシーポリシー</a>に同意します（必須）
        </label>
      </div>

      <div class="row" style="margin-top:16px">
        <button type="submit" id="submitBtn">会員登録してテストを始める</button>
        <a href="login.html" class="link" style="font-size:13px">既にアカウントがある方</a>
      </div>
    </form>
  </div>
  <p class="muted" style="text-align:center">
    既にアカウントをお持ちの方は <a href="login.html" class="link">ログイン</a>
  </p>
</div>

<script>
"use strict";

const msg = document.getElementById("msg");
function showMsg(cls, text) { msg.innerHTML = `<div class="${cls}">${text}</div>`; }

// 大学プルダウン → 「その他」選択時に自由入力欄を出す
document.getElementById("university_select").addEventListener("change", (ev) => {
  const other = document.getElementById("university_other");
  if (ev.target.value === "__other__") {
    other.style.display = "";
    other.required = true;
    other.focus();
  } else {
    other.style.display = "none";
    other.required = false;
    other.value = "";
  }
});

document.getElementById("f").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  showMsg("notice", "登録処理中…");

  // 大学名: select or その他の自由入力
  const uniSel = document.getElementById("university_select").value;
  const uniOther = document.getElementById("university_other").value.trim();
  const university = uniSel === "__other__" ? uniOther : uniSel;

  const payload = {
    email: document.getElementById("email").value.trim(),
    password: document.getElementById("password").value,
    nickname: document.getElementById("nickname").value.trim(),
    university,
    graduation_year: document.getElementById("graduation_year").value,
    first_choice_industry: document.getElementById("first_choice_industry").value || null,
    consent_terms: document.getElementById("consent_terms").checked
  };

  if (!university) {
    showMsg("error", "所属大学名を選択または入力してください。");
    btn.disabled = false;
    return;
  }

  if (!payload.consent_terms) {
    showMsg("error", "利用規約とプライバシーポリシーへの同意が必須です。");
    btn.disabled = false;
    return;
  }

  try {
    await window.AuthApp.register(payload);
    showMsg("ok", "✓ 登録が完了しました。テストページへ移動します…");
    setTimeout(() => { location.href = "index.html"; }, 1200);
  } catch (e) {
    showMsg("error", "登録失敗: " + (e.message || e));
    btn.disabled = false;
  }
});
</script>
</body>
</html>
