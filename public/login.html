<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — WEBテスト練習</title>
<script src="auth-common.js"></script>
</head>
<body>
<div class="container">
  <h1>ログイン</h1>
  <div id="msg"></div>
  <div class="panel">
    <form id="f">
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="email" required autocomplete="email" autofocus>
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <div class="row">
        <button type="submit" id="submitBtn">ログイン</button>
        <a href="signup.html" class="link" style="font-size:13px">新規登録はこちら</a>
      </div>
    </form>
  </div>
  <p class="muted" style="text-align:center">
    アカウントをお持ちでない方は <a href="signup.html" class="link">新規登録</a>
  </p>
</div>
<script>
"use strict";
const msg = document.getElementById("msg");
function showMsg(cls, text) { msg.innerHTML = `<div class="${cls}">${text}</div>`; }

document.getElementById("f").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  showMsg("notice", "ログイン中…");
  try {
    await window.AuthApp.signIn(
      document.getElementById("email").value.trim(),
      document.getElementById("password").value
    );
    showMsg("ok", "✓ ログインしました。移動します…");
    setTimeout(() => { location.href = "/"; }, 800);
  } catch (e) {
    showMsg("error", "ログイン失敗: " + (e.message || e));
    btn.disabled = false;
  }
});
</script>
</body>
</html>
