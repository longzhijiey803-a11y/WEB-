<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者インサイト — WEBテスト練習</title>
<script src="auth-common.js"></script>
<style>
  body { background: #f5f5f7; }
  .admin-shell { max-width: 1180px; margin: 0 auto; padding: 22px 16px 56px; }
  .admin-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 18px;
  }
  .admin-title { margin: 0; font-size: 26px; line-height: 1.25; }
  .admin-sub { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
  .admin-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .admin-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
  }
  .admin-link:hover { background: #f0f0f5; }
  .insight-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
  .insight-card {
    background: #fff;
    border: 1px solid rgba(0,0,0,0.04);
    border-radius: 8px;
    padding: 16px;
    box-shadow: var(--shadow);
    min-height: 118px;
  }
  .insight-label { display: block; color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: .04em; }
  .insight-value { display: block; margin-top: 8px; font-size: 32px; font-weight: 800; line-height: 1; }
  .insight-note { display: block; margin-top: 8px; color: var(--muted); font-size: 12px; }
  .admin-grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 16px; }
  .admin-panel { background: #fff; border-radius: 8px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .panel-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .panel-head h2 { margin: 0; font-size: 17px; }
  .panel-head p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .filter-row input, .filter-row select { max-width: 260px; }
  .bar-list { display: grid; gap: 10px; }
  .bar-row { display: grid; grid-template-columns: 118px 1fr 54px; gap: 10px; align-items: center; font-size: 13px; }
  .bar-track { height: 12px; border-radius: 99px; background: #ececf0; overflow: hidden; }
  .bar-fill { display: block; height: 100%; border-radius: 99px; background: linear-gradient(90deg, #0071e3, #34c759); }
  .bar-fill.warn { background: linear-gradient(90deg, #ff9500, #ff3b30); }
  .table-wrap { overflow-x: auto; }
  .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .admin-table th, .admin-table td { border-bottom: 1px solid var(--border); padding: 9px 8px; text-align: left; vertical-align: top; white-space: nowrap; }
  .admin-table th { color: var(--muted); font-size: 11px; letter-spacing: .04em; text-transform: uppercase; }
  .admin-table td.wrap { white-space: normal; min-width: 180px; }
  .pill {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 99px;
    background: #eef5ff;
    color: #0066cc;
    font-size: 12px;
    font-weight: 700;
  }
  .pill.good { background: #e8f9ee; color: #188a42; }
  .pill.bad { background: #ffeeee; color: #c41d16; }
  .pill.neutral { background: #f0f0f5; color: #515154; }
  .empty { color: var(--muted); font-size: 13px; padding: 12px 0; }
  .gate { max-width: 520px; margin: 40px auto; }
  .gate .panel { border-radius: 8px; }
  .mono-small { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12px; }
  @media (max-width: 900px) {
    .insight-grid, .admin-grid { grid-template-columns: 1fr; }
    .admin-header { flex-direction: column; }
    .admin-actions { justify-content: flex-start; }
  }
  @media (max-width: 560px) {
    .bar-row { grid-template-columns: 1fr; gap: 4px; }
    .insight-card { min-height: auto; }
  }
</style>
</head>
<body>
<div class="admin-shell">
  <header class="admin-header">
    <div>
      <h1 class="admin-title">管理者インサイト</h1>
      <p class="admin-sub">ログイン、受験、回答、離脱、プロフィール登録をこのブラウザの保存データから集計します。</p>
    </div>
    <div class="admin-actions">
      <a class="admin-link" href="index.html">テストへ</a>
      <button class="secondary" id="refreshBtn" type="button">更新</button>
      <button class="secondary" id="jsonBtn" type="button">JSON出力</button>
      <button class="secondary" id="csvBtn" type="button">CSV出力</button>
      <button class="ghost" id="lockBtn" type="button">ロック</button>
    </div>
  </header>
  <div id="gate"></div>
  <main id="adminApp"></main>
</div>

<script>
"use strict";

const gateEl = document.getElementById("gate");
const appEl = document.getElementById("adminApp");

const MODE_LABELS = {
  ja: "言語",
  en: "英語",
  num: "計数",
  num_ja: "計数＋言語",
  num_ja_en: "計数＋言語＋英語"
};

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" }[c]));
}

function formatDate(value) {
  if (!value) return "-";
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return "-";
  return d.toLocaleString("ja-JP", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
}

function formatDuration(sec) {
  const n = Number(sec || 0);
  const m = Math.floor(n / 60);
  const s = n % 60;
  return `${m}分${s}秒`;
}

function percent(value, total) {
  return total > 0 ? Math.round((value / total) * 100) : 0;
}

function average(values) {
  const nums = values.map(Number).filter(n => Number.isFinite(n));
  return nums.length ? nums.reduce((a, b) => a + b, 0) / nums.length : 0;
}

function getData() {
  return window.AuthApp?.exportLocalData?.() || {
    users: [],
    results: [],
    pending_user_profiles: [],
    analytics_events: [],
    test_sessions: []
  };
}

function attemptSummary(attempt) {
  const sections = attempt.sections || [];
  const score = sections.reduce((sum, s) => sum + Number(s.score || 0), 0);
  const total = sections.reduce((sum, s) => sum + Number(s.total || 0), 0);
  const duration = sections.reduce((sum, s) => sum + Number(s.duration_sec || s.elapsedSec || 0), 0);
  return {
    score,
    total,
    duration,
    accuracy: total > 0 ? Math.round((score / total) * 100) : 0
  };
}

function latestProfileByEmail(profiles) {
  const map = new Map();
  profiles.forEach(entry => {
    const profile = entry.profile || {};
    const email = String(profile.email || "").toLowerCase();
    if (!email) return;
    const prev = map.get(email);
    if (!prev || new Date(entry.saved_at || 0) > new Date(prev.saved_at || 0)) map.set(email, entry);
  });
  return map;
}

function buildUserRows(data) {
  const profilesByEmail = latestProfileByEmail(data.pending_user_profiles || []);
  const rows = new Map();

  function ensure(key, base = {}) {
    if (!rows.has(key)) {
      rows.set(key, {
        key,
        email: base.email || "",
        name: base.name || "",
        university: base.university || "",
        department: base.department || "",
        graduation: base.graduation || "",
        attempts: 0,
        accuracies: [],
        bestAccuracy: 0,
        latestAttemptAt: "",
        latestScore: "-",
        totalDuration: 0,
        abandons: []
      });
    }
    return rows.get(key);
  }

  (data.users || []).forEach(user => {
    const email = String(user.email || "").toLowerCase();
    const profileEntry = profilesByEmail.get(email);
    const profile = profileEntry?.profile || {};
    ensure(email || user.id, {
      email,
      name: profile.full_name || user.nickname || email,
      university: profile.university || user.university || "",
      department: profile.department || "",
      graduation: profile.graduation_year || user.graduation_year || ""
    });
  });

  (data.pending_user_profiles || []).forEach(entry => {
    const profile = entry.profile || {};
    const email = String(profile.email || "").toLowerCase();
    if (!email) return;
    const row = ensure(email, {
      email,
      name: profile.full_name || email,
      university: profile.university || "",
      department: profile.department || "",
      graduation: profile.graduation_year || ""
    });
    row.name = profile.full_name || row.name;
    row.university = profile.university || row.university;
    row.department = profile.department || row.department;
    row.graduation = profile.graduation_year || row.graduation;
  });

  (data.results || []).forEach(attempt => {
    const key = String(attempt.user_email || attempt.user_id || "guest").toLowerCase();
    const row = ensure(key, {
      email: attempt.user_email || "",
      name: attempt.user_email || "ゲスト"
    });
    const s = attemptSummary(attempt);
    row.attempts += 1;
    row.accuracies.push(s.accuracy);
    row.bestAccuracy = Math.max(row.bestAccuracy, s.accuracy);
    row.totalDuration += s.duration;
    if (!row.latestAttemptAt || new Date(attempt.saved_at || 0) > new Date(row.latestAttemptAt || 0)) {
      row.latestAttemptAt = attempt.saved_at || "";
      row.latestScore = `${s.score}/${s.total}`;
    }
  });

  (data.test_sessions || []).forEach(session => {
    if (session.status !== "abandoned") return;
    const key = String(session.user_email || session.user_id || "guest").toLowerCase();
    const row = ensure(key, {
      email: session.user_email || "",
      name: session.user_email || "ゲスト"
    });
    row.abandons.push(session);
  });

  return Array.from(rows.values()).sort((a, b) =>
    (b.attempts - a.attempts) || (average(b.accuracies) - average(a.accuracies))
  );
}

function buildQuestionRows(data) {
  const map = new Map();
  (data.results || []).forEach(attempt => {
    (attempt.answers || []).forEach(answer => {
      const qn = Number(answer.global_index || 0) + 1;
      const key = `${answer.mode || "test"}-${qn}`;
      if (!map.has(key)) {
        map.set(key, {
          key,
          mode: answer.mode || "-",
          question: qn,
          attempts: 0,
          correct: 0,
          skipped: 0,
          times: []
        });
      }
      const row = map.get(key);
      row.attempts += 1;
      if (answer.selected_index === null || answer.selected_index === undefined) row.skipped += 1;
      if (answer.is_correct) row.correct += 1;
      if (answer.time_spent_sec) row.times.push(Number(answer.time_spent_sec));
    });
  });
  return Array.from(map.values()).sort((a, b) =>
    percent(a.correct, a.attempts) - percent(b.correct, b.attempts)
  );
}

function buildModeRows(data) {
  const map = new Map();
  (data.results || []).forEach(attempt => {
    (attempt.sections || []).forEach(section => {
      const key = section.mode || "unknown";
      if (!map.has(key)) map.set(key, { mode: key, attempts: 0, score: 0, total: 0, duration: 0 });
      const row = map.get(key);
      row.attempts += 1;
      row.score += Number(section.score || 0);
      row.total += Number(section.total || 0);
      row.duration += Number(section.duration_sec || 0);
    });
  });
  return Array.from(map.values()).sort((a, b) => b.attempts - a.attempts);
}

function buildDailyRows(data) {
  const map = new Map();
  (data.results || []).forEach(attempt => {
    const date = (attempt.saved_at || "").slice(0, 10) || "unknown";
    if (!map.has(date)) map.set(date, { date, attempts: 0, profiles: 0 });
    map.get(date).attempts += 1;
  });
  (data.pending_user_profiles || []).forEach(entry => {
    const date = (entry.saved_at || "").slice(0, 10) || "unknown";
    if (!map.has(date)) map.set(date, { date, attempts: 0, profiles: 0 });
    map.get(date).profiles += 1;
  });
  return Array.from(map.values()).sort((a, b) => a.date.localeCompare(b.date)).slice(-14);
}

function renderBars(items, total, warn = false) {
  if (!items.length) return `<div class="empty">データがありません。</div>`;
  const max = Math.max(1, total || Math.max(...items.map(item => item.value)));
  return `<div class="bar-list">${items.map(item => `
    <div class="bar-row">
      <strong>${escapeHtml(item.label)}</strong>
      <div class="bar-track"><span class="bar-fill ${warn ? "warn" : ""}" style="width:${Math.max(3, percent(item.value, max))}%"></span></div>
      <span>${escapeHtml(item.caption ?? item.value)}</span>
    </div>
  `).join("")}</div>`;
}

function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function toCsv(rows) {
  return rows.map(row => row.map(value => {
    const text = String(value ?? "");
    return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
  }).join(",")).join("\n");
}

function exportJson() {
  const data = getData();
  downloadBlob(JSON.stringify(data, null, 2), `webtest-insights-${new Date().toISOString().slice(0, 10)}.json`, "application/json");
}

function exportCsv() {
  const data = getData();
  const rows = [["type", "email", "name", "university", "department", "graduation", "score", "accuracy", "saved_at"]];
  (data.pending_user_profiles || []).forEach(entry => {
    const p = entry.profile || {};
    const r = entry.test_result || {};
    rows.push(["profile", p.email, p.full_name, p.university, p.department, p.graduation_year, `${r.score ?? ""}/${r.total_questions ?? ""}`, r.accuracy_percent ?? "", entry.saved_at]);
  });
  (data.results || []).forEach(attempt => {
    const s = attemptSummary(attempt);
    rows.push(["attempt", attempt.user_email || attempt.user_id || "guest", "", "", "", "", `${s.score}/${s.total}`, s.accuracy, attempt.saved_at]);
  });
  downloadBlob(toCsv(rows), `webtest-insights-${new Date().toISOString().slice(0, 10)}.csv`, "text/csv;charset=utf-8");
}

function adminUnlocked() {
  const state = window.AuthApp?.getAdminState?.();
  return !!(state?.has_passcode && state?.unlocked);
}

function requireAdmin(action) {
  if (!adminUnlocked()) {
    renderGate();
    return;
  }
  action();
}

function renderDashboard() {
  gateEl.innerHTML = "";
  const data = getData();
  const sessions = data.test_sessions || [];
  const attempts = data.results || [];
  const profiles = data.pending_user_profiles || [];
  const events = data.analytics_events || [];
  const userRows = buildUserRows(data);
  const questionRows = buildQuestionRows(data);
  const modeRows = buildModeRows(data);
  const dailyRows = buildDailyRows(data);

  const completedSessions = sessions.filter(s => s.status === "completed").length || attempts.length;
  const abandonedSessions = sessions.filter(s => s.status === "abandoned").length;
  const startedSessions = Math.max(sessions.length, completedSessions + abandonedSessions);
  const answeredSessions = sessions.filter(s => Number(s.answered_count || 0) > 0).length;
  const avgAccuracy = Math.round(average(attempts.map(a => attemptSummary(a).accuracy)));
  const completionRate = percent(completedSessions, startedSessions);
  const abandonRate = percent(abandonedSessions, startedSessions);

  const dropMap = new Map();
  sessions.filter(s => s.status === "abandoned").forEach(session => {
    const q = Number(session.current_question_number || 1);
    dropMap.set(q, (dropMap.get(q) || 0) + 1);
  });
  const dropRows = Array.from(dropMap.entries())
    .map(([q, value]) => ({ label: `Q${q}`, value, caption: `${value}件` }))
    .sort((a, b) => Number(a.label.slice(1)) - Number(b.label.slice(1)));

  const funnelRows = [
    { label: "テスト開始", value: startedSessions },
    { label: "回答あり", value: answeredSessions || attempts.length },
    { label: "完了", value: completedSessions },
    { label: "登録送信", value: profiles.length }
  ].map(row => ({ ...row, caption: `${row.value}件` }));

  appEl.innerHTML = `
    <section class="insight-grid">
      <div class="insight-card">
        <span class="insight-label">STARTS</span>
        <span class="insight-value">${startedSessions}</span>
        <span class="insight-note">テスト開始セッション</span>
      </div>
      <div class="insight-card">
        <span class="insight-label">COMPLETION</span>
        <span class="insight-value">${completionRate}%</span>
        <span class="insight-note">完了 ${completedSessions}件 / 離脱 ${abandonedSessions}件</span>
      </div>
      <div class="insight-card">
        <span class="insight-label">AVG SCORE</span>
        <span class="insight-value">${avgAccuracy || 0}%</span>
        <span class="insight-note">保存済み成績 ${attempts.length}件</span>
      </div>
      <div class="insight-card">
        <span class="insight-label">PROFILES</span>
        <span class="insight-value">${profiles.length}</span>
        <span class="insight-note">同意付きプロフィール登録</span>
      </div>
    </section>

    <section class="admin-grid">
      <div>
        <div class="admin-panel">
          <div class="panel-head">
            <div>
              <h2>受験ファネル</h2>
              <p>開始からプロフィール登録までの到達状況</p>
            </div>
            <span class="pill ${abandonRate >= 30 ? "bad" : "neutral"}">離脱 ${abandonRate}%</span>
          </div>
          ${renderBars(funnelRows, Math.max(1, startedSessions))}
        </div>

        <div class="admin-panel">
          <div class="panel-head">
            <div>
              <h2>何問目で離脱しているか</h2>
              <p>ページを閉じる、戻る、別ページへ移動したタイミングを保存</p>
            </div>
            <span class="pill bad">${abandonedSessions}件</span>
          </div>
          ${renderBars(dropRows, Math.max(1, abandonedSessions), true)}
        </div>

        <div class="admin-panel">
          <div class="panel-head">
            <div>
              <h2>ログインユーザー別の成績</h2>
              <p>会員、プロフィール、受験履歴をメールアドレスで統合</p>
            </div>
          </div>
          <div class="filter-row">
            <input id="userSearch" type="search" placeholder="名前・メール・大学で検索">
          </div>
          <div class="table-wrap">
            <table class="admin-table" id="userTable"></table>
          </div>
        </div>

        <div class="admin-panel">
          <div class="panel-head">
            <div>
              <h2>問題別インサイト</h2>
              <p>正答率が低い設問、平均回答時間、未回答数</p>
            </div>
          </div>
          <div class="table-wrap">
            <table class="admin-table">
              <thead><tr><th>問題</th><th>受験数</th><th>正答率</th><th>平均時間</th><th>未回答</th></tr></thead>
              <tbody>
                ${questionRows.slice(0, 14).map(row => `
                  <tr>
                    <td><span class="pill neutral">${escapeHtml(MODE_LABELS[row.mode] || row.mode)} Q${row.question}</span></td>
                    <td>${row.attempts}</td>
                    <td>${percent(row.correct, row.attempts)}%</td>
                    <td>${row.times.length ? `${Math.round(average(row.times))}秒` : "-"}</td>
                    <td>${row.skipped}</td>
                  </tr>
                `).join("") || `<tr><td colspan="5" class="empty">回答データがありません。</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div>
        <div class="admin-panel">
          <div class="panel-head">
            <div>
              <h2>日別推移</h2>
              <p>直近14日の受験数とプロフィール登録数</p>
            </div>
          </div>
          ${renderBars(dailyRows.map(row => ({
            label: row.date.slice(5),
            value: row.attempts,
            caption: `${row.attempts}件 / 登録${row.profiles}`
          })), Math.max(1, ...dailyRows.map(row => row.attempts)))}
        </div>

        <div class="admin-panel">
          <div class="panel-head">
            <div>
              <h2>テスト種別の成績</h2>
              <p>言語・英語・計数ごとの平均正答率</p>
            </div>
          </div>
          ${renderBars(modeRows.map(row => ({
            label: MODE_LABELS[row.mode] || row.mode,
            value: percent(row.score, row.total),
            caption: `${percent(row.score, row.total)}%`
          })), 100)}
        </div>

        <div class="admin-panel">
          <div class="panel-head">
            <div>
              <h2>登録プロフィール</h2>
              <p>企業提供に同意済みの未送信リスト</p>
            </div>
            <span class="pill good">${profiles.length}件</span>
          </div>
          <div class="table-wrap">
            <table class="admin-table">
              <thead><tr><th>氏名</th><th>学校</th><th>スコア</th><th>保存</th></tr></thead>
              <tbody>
                ${profiles.slice().reverse().slice(0, 10).map(entry => {
                  const p = entry.profile || {};
                  const r = entry.test_result || {};
                  return `
                    <tr>
                      <td>${escapeHtml(p.full_name || p.email || "-")}<br><span class="muted">${escapeHtml(p.phone || "")}</span></td>
                      <td class="wrap">${escapeHtml(p.university || "-")}<br><span class="muted">${escapeHtml(p.department || "")} ${escapeHtml(p.graduation_year || "")}</span></td>
                      <td>${r.score ?? "-"} / ${r.total_questions ?? "-"}<br><span class="muted">${r.accuracy_percent ?? "-"}%</span></td>
                      <td>${formatDate(entry.saved_at)}</td>
                    </tr>
                  `;
                }).join("") || `<tr><td colspan="4" class="empty">プロフィール登録はまだありません。</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>

        <div class="admin-panel">
          <div class="panel-head">
            <div>
              <h2>最新イベント</h2>
              <p>ログイン、回答、完了、離脱などの行動ログ</p>
            </div>
          </div>
          <div class="table-wrap">
            <table class="admin-table">
              <thead><tr><th>時刻</th><th>イベント</th><th>ユーザー</th><th>詳細</th></tr></thead>
              <tbody>
                ${events.slice().reverse().slice(0, 14).map(ev => `
                  <tr>
                    <td>${formatDate(ev.created_at)}</td>
                    <td><span class="pill neutral">${escapeHtml(ev.event_type)}</span></td>
                    <td>${escapeHtml(ev.user_email || "-")}</td>
                    <td class="wrap mono-small">${escapeHtml(JSON.stringify({
                      q: ev.question_number,
                      mode: ev.mode,
                      session: ev.session_id
                    }))}</td>
                  </tr>
                `).join("") || `<tr><td colspan="4" class="empty">イベントはまだありません。</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  `;

  renderUserTable(userRows);
  document.getElementById("userSearch").addEventListener("input", ev => {
    renderUserTable(userRows, ev.target.value);
  });
}

function renderUserTable(rows, query = "") {
  const q = String(query || "").trim().toLowerCase();
  const filtered = rows.filter(row => !q || [
    row.name, row.email, row.university, row.department, row.graduation
  ].some(value => String(value || "").toLowerCase().includes(q)));
  const table = document.getElementById("userTable");
  if (!table) return;
  table.innerHTML = `
    <thead>
      <tr><th>ユーザー</th><th>学校</th><th>受験</th><th>平均</th><th>最高</th><th>最新</th><th>離脱</th></tr>
    </thead>
    <tbody>
      ${filtered.map(row => `
        <tr>
          <td class="wrap"><strong>${escapeHtml(row.name || row.email || "ゲスト")}</strong><br><span class="muted">${escapeHtml(row.email || "")}</span></td>
          <td class="wrap">${escapeHtml(row.university || "-")}<br><span class="muted">${escapeHtml(row.department || "")} ${escapeHtml(row.graduation || "")}</span></td>
          <td>${row.attempts}</td>
          <td>${Math.round(average(row.accuracies)) || 0}%</td>
          <td>${row.bestAccuracy || 0}%</td>
          <td>${escapeHtml(row.latestScore)}<br><span class="muted">${formatDate(row.latestAttemptAt)}</span></td>
          <td>${row.abandons.length ? `<span class="pill bad">Q${row.abandons[row.abandons.length - 1].current_question_number || "-"} / ${row.abandons.length}件</span>` : `<span class="pill good">なし</span>`}</td>
        </tr>
      `).join("") || `<tr><td colspan="7" class="empty">該当するユーザーはありません。</td></tr>`}
    </tbody>
  `;
}

function renderGate() {
  const admin = window.AuthApp?.getAdminState?.() || { has_passcode: false, unlocked: false };
  appEl.innerHTML = "";
  if (admin.has_passcode && admin.unlocked) {
    renderDashboard();
    return;
  }

  const isSetup = !admin.has_passcode;
  gateEl.innerHTML = `
    <div class="gate">
      <div class="panel">
        <h2>${isSetup ? "管理者キーを設定" : "管理者ログイン"}</h2>
        <p class="muted">${isSetup ? "初回のみ、このブラウザで管理画面を開くためのキーを設定します。" : "設定済みの管理者キーを入力してください。"}</p>
        <div id="gateMsg"></div>
        <form id="gateForm">
          <div class="field">
            <label for="adminPass">${isSetup ? "新しい管理者キー（8文字以上）" : "管理者キー"}</label>
            <input id="adminPass" type="password" required minlength="8" autocomplete="current-password" autofocus>
          </div>
          <div class="row">
            <button type="submit">${isSetup ? "設定して開く" : "開く"}</button>
            <a class="admin-link" href="index.html">戻る</a>
          </div>
        </form>
      </div>
    </div>
  `;
  document.getElementById("gateForm").addEventListener("submit", async ev => {
    ev.preventDefault();
    const msg = document.getElementById("gateMsg");
    const pass = document.getElementById("adminPass").value;
    try {
      if (isSetup) await window.AuthApp.setAdminPasscode(pass);
      else await window.AuthApp.unlockAdmin(pass);
      renderDashboard();
    } catch (err) {
      msg.innerHTML = `<div class="error">${escapeHtml(err.message || String(err))}</div>`;
    }
  });
}

document.getElementById("refreshBtn").addEventListener("click", renderGate);
document.getElementById("jsonBtn").addEventListener("click", () => requireAdmin(exportJson));
document.getElementById("csvBtn").addEventListener("click", () => requireAdmin(exportCsv));
document.getElementById("lockBtn").addEventListener("click", () => {
  window.AuthApp?.lockAdmin?.();
  renderGate();
});

(async function bootstrap() {
  await window.AuthApp?.ready;
  renderGate();
})();
</script>
</body>
</html>
